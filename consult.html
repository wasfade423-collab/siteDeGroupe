<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plateforme de création de groupes GEI IT2</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Style focus pour tes futurs inputs si nécessaire */
        input:focus { 
            transform: scale(1.01); 
            transition: all 0.2s; 
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <nav class="bg-white border-b border-slate-100 sticky top-0 z-40 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <div class="flex items-center gap-3">
                    <div class="bg-amber-700 p-2 rounded-lg shadow-lg">
                        <i class="ri-team-fill text-white text-2xl"></i>
                    </div>
                    <h1 class="text-xl md:text-2xl font-black text-slate-700 tracking-tight uppercase">
                        Générateur<span class="text-amber-700">Groupes</span>
                    </h1>
                </div>
                <a href="create.html" class="hidden sm:flex items-center bg-amber-700 hover:bg-amber-800 text-white font-bold py-2.5 px-5 rounded-xl shadow-md transition-all transform hover:-translate-y-1 active:scale-95">
                    <i class="ri-add-circle-line mr-2 text-lg"></i> Nouveau Groupe
                </a>
                <a href="create.html" class="sm:hidden bg-amber-700 p-3 rounded-full text-white shadow-lg">
                    <i class="ri-add-line text-xl"></i>
                </a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-10">
            <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm flex items-center gap-4">
                <div class="bg-slate-100 p-3 rounded-full text-slate-500"><i class="ri-group-line text-xl"></i></div>
                <div>
                    <p class="text-xs font-bold text-slate-400 uppercase">Total Groupes</p>
                    <p id="totalGroupes" class="text-xl font-bold text-slate-700">0</p>
                </div>
            </div>
        </div>

        <div id="groupContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </main>

    <script>
        const groupesDeTest = [
            { membres: ["Jean Dupont", "Marie Curie", "ALICE WATSON"] },
            { membres: ["bob marley", "Charlie Chaplin"] },
            { membres: ["PROPHÈTE SAMUEL", "nicolas tesla", "Ada Lovelace", "Steve Jobs"] }
        ];

        function chargerGroupes() {
            const container = document.getElementById('groupContainer');
            document.getElementById('totalGroupes').innerText = groupesDeTest.length;
            container.innerHTML = ""; 

            groupesDeTest.forEach((groupe, index) => {
                container.innerHTML += formaterCarteGroupe(groupe, index + 1);
            });
        }

        function formaterCarteGroupe(groupe, numero) {
            const nbMembres = groupe.membres.length;
            
            const listeMembres = groupe.membres.map((membre, i) => {
                const badgeResponsable = i === 0 ? 
                    `<span class="inline-flex items-center bg-amber-100 text-amber-700 text-[9px] px-2 py-0.5 rounded-md font-black uppercase ml-auto">
                        <i class="ri-vip-crown-fill mr-1"></i> Chef
                    </span>` : '';
                
                return `
                    <li class="group flex items-center p-3 rounded-xl hover:bg-slate-50 transition-colors border-b border-slate-50 last:border-0">
                        <div class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-slate-500 text-xs font-bold mr-3 group-hover:bg-amber-100 group-hover:text-amber-700 transition-colors">
                            ${i + 1}
                        </div>
                        <span class="capitalize text-slate-600 font-medium">${membre.toLowerCase().trim()}</span>
                        ${badgeResponsable}
                    </li>`;
            }).join('');

            return `
                <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden hover:shadow-xl hover:border-amber-200 transition-all duration-300 animate-card">
                    <div class="bg-slate-50/50 p-5 border-b border-slate-100">
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="text-slate-400 text-[10px] font-black uppercase tracking-widest">Identification</h3>
                                <p class="text-lg font-bold text-slate-700">Groupe #0${numero}</p>
                            </div>
                            <span class="bg-white px-3 py-1 rounded-lg border border-slate-200 text-slate-500 text-[10px] font-bold shadow-sm">
                                <i class="ri-user-follow-line mr-1"></i>${nbMembres} Membres
                            </span>
                        </div>
                    </div>
                    <div class="p-4">
                        <ul class="space-y-1">
                            ${listeMembres}
                        </ul>
                    </div>
                    <div class="px-5 py-3 bg-slate-50/30 text-right">
                         <button class="text-slate-400 hover:text-amber-700 text-xs font-bold transition-colors">
                            <i class="ri-more-2-fill"></i> Détails
                         </button>
                    </div>
                </div>
            `;
        }

        window.onload = chargerGroupes;
    </script>
</body>
</html>
